services:

  # -------------------------------------------------------------------
  # PostgreSQL — our main database
  # Stores: document metadata, job records, user data
  # AND: AI vector embeddings (via the pgvector extension)
  # One database does everything — no separate vector DB needed.
  # -------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16      # PostgreSQL 16 with pgvector pre-installed
    container_name: documind_postgres
    environment:
      POSTGRES_DB: documind
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind      # local dev only — never use simple passwords in production
    ports:
      - "5432:5432"                    # your Mac can reach PostgreSQL at localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data survives container restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind -d documind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------
  # Redis — fast short-term memory (whiteboard)
  # Used for: Celery task queue (background jobs) + semantic caching
  # -------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: documind_redis
    ports:
      - "6379:6379"                    # your Mac can reach Redis at localhost:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------
  # Flower — Celery monitoring dashboard
  # Real-time visibility into task state, worker health, and queue depth.
  # Dashboard available at http://localhost:5555 (requires FLOWER_USER / FLOWER_PASSWORD from .env)
  # -------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    container_name: documind_flower
    command: celery --broker=redis://redis:6379 flower --port=5555
    environment:
      FLOWER_BASIC_AUTH: "${FLOWER_USER}:${FLOWER_PASSWORD}"
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5555/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------
  # Ollama — local LLM runtime (free, no API key, runs on your machine)
  # Used as: final fallback when OpenAI / Anthropic / Bedrock are unavailable
  # Models are stored in the ollama_data volume — persists across restarts.
  # One-time setup: docker compose exec ollama ollama pull llama3.2
  # -------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: documind_ollama
    ports:
      - "11434:11434"                  # Django (on host) connects at localhost:11434
    volumes:
      - ollama_data:/root/.ollama      # downloaded models (~2GB) survive restarts
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s               # model loading on first start can take 20-30s

  # -------------------------------------------------------------------
  # MinIO — fake S3 running locally
  # Stores: uploaded PDF files and documents
  # Speaks the exact same language as AWS S3 — swap credentials to go live.
  # Web dashboard available at http://localhost:9001
  # -------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: documind_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: documind              # this is your "AWS Access Key" locally
      MINIO_ROOT_PASSWORD: documind123       # this is your "AWS Secret Key" locally
    ports:
      - "9000:9000"                          # S3 API — your app talks to this
      - "9001:9001"                          # web dashboard — you browse files here
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

# Permanent storage — Docker keeps this data on your machine
# even when containers are stopped or restarted
volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
