name: Eval

on:
  workflow_dispatch:  # run on demand
  schedule:
    - cron: '0 6 * * 1'  # weekly on Monday 06:00 UTC

jobs:
  ragas-eval:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: documind
          POSTGRES_USER: documind
          POSTGRES_PASSWORD: documind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-only-not-for-production
      DATABASE_URL: postgresql://documind:documind@localhost:5432/documind
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_STORAGE_BUCKET_NAME: dummy
      REDIS_URL: redis://localhost:6379
      LOG_FORMAT: verbose
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RAGAS_LLM_MODEL: gpt-4o-mini
      EVAL_DATASET_PATH: data/eval/qa_pairs.json

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run python manage.py migrate

      - name: Generate eval PDFs
        run: uv run python scripts/create_eval_docs.py

      - name: Start Celery worker
        run: uv run celery -A core worker -l warning &
        env:
          CELERY_ALWAYS_EAGER: "false"

      - name: Run full RAGAS evaluation
        run: uv run python tests/evals/run_evals.py --no-cache --output-dir eval_reports

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ github.sha }}
          path: eval_reports/
          retention-days: 90
