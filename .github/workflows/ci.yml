name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # lint — code style + formatting (fast, no services needed)
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true       # caches the uv package cache keyed on uv.lock

      - run: uv sync --dev

      - name: Check lint (ruff)
        run: uv run ruff check .

      - name: Check formatting (ruff format)
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # unit-tests — full unit test suite with coverage enforcement
  # ---------------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: documind
          POSTGRES_USER: documind
          POSTGRES_PASSWORD: documind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-only-not-for-production
      DATABASE_URL: postgresql://documind:documind@localhost:5432/documind
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_STORAGE_BUCKET_NAME: dummy
      REDIS_URL: redis://localhost:6379
      LOG_FORMAT: verbose

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --dev

      - name: Check for uncommitted migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: uv run python manage.py migrate

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit/ --cov=. --cov-report=term-missing --cov-fail-under=85

  # ---------------------------------------------------------------------------
  # security — dependency CVE scan (fast, no services needed)
  # ---------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync

      - name: Audit dependencies for known CVEs
        # Export pinned requirements from the lockfile so pip-audit audits
        # exactly what we ship, not uvx's own isolated environment.
        # CVE-2026-4539  (pygments)  — no fix released; pinned to <2.19.0 in pyproject.toml
        # CVE-2025-69872 (diskcache) — no fix released; transitive via instructor/ragas
        run: |
          uv export --no-hashes --format requirements-txt > /tmp/requirements-audit.txt
          uvx pip-audit -r /tmp/requirements-audit.txt \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2025-69872
